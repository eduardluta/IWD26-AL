  'Music':           { bg: '#ffebee', text: '#c62828', bar: '#FF384F' },
  'Sports':          { bg: '#e8f5e9', text: '#2e7d32', bar: '#43a047' },
  'Acting':          { bg: '#fff3e0', text: '#e65100', bar: '#ff9800' },
  'Politics':        { bg: '#f3e5f5', text: '#6a1b9a', bar: '#8e24aa' },
  'Fashion':         { bg: '#fce4ec', text: '#ad1457', bar: '#e91e63' },
  'Historical':      { bg: '#fff8e1', text: '#f57f17', bar: '#fbc02d' },
  'Literature':      { bg: '#e3f2fd', text: '#1565c0', bar: '#1e88e5' },
  'Science':         { bg: '#e0f2f1', text: '#00695c', bar: '#00897b' },
  'Public Figure':   { bg: '#f5f5f5', text: '#333333', bar: '#757575' },
  'Business':        { bg: '#fff3e0', text: '#e65100', bar: '#ff9800' },

  'default':         { bg: '#f5f5f5', text: '#333333', bar: '#999999' }
};
function getCatColor(cat) { return CAT_COLORS[cat] || CAT_COLORS['default']; }

const CAT_SQ = {
  'Music': 'Muzik\u00EB', 'Sports': 'Sport', 'Acting': 'Aktrim', 'Politics': 'Politik\u00EB',
  'Fashion': 'Mod\u00EB', 'Historical': 'Historike', 'Literature': 'Let\u00EBrsi',
  'Science': 'Shkenc\u00EB', 'Public Figure': 'Figur\u00EB Publike', 'Business': 'Biznes',
  'Influencer': 'Influencere', 'Film & Theatre': 'Film & Teat\u00EBr', 'Activism': 'Aktiviz\u00EBm',
  'TV': 'TV', 'TV / Influencer': 'TV / Influencere'
};
function catLabel(cat) { return CAT_SQ[cat] || cat; }

function fmtNum(val) {
  if (!val || val === '\u2014') return '\u2014';
  const s = val.toString().trim();
  if (/[MK]$/i.test(s)) {
    const suffix = s.slice(-1);
    const num = parseFloat(s.slice(0, -1));
    if (isNaN(num)) return s;
    return Math.round(num) + suffix;
  }
  const raw = parseFloat(s.replace(/,/g, ''));
  if (isNaN(raw)) return val;
  if (raw >= 1000000) return Math.round(raw / 1000000) + 'M';
  if (raw >= 1000) return Math.round(raw / 1000) + 'K';
  return raw.toString();
}

function getFlags(country) {
  const c = country.toLowerCase();
  const flags = [];
  const isFromAlbania = /^albania/i.test(country.trim());
  const isAlbanianDiaspora = /\(albanian\)/i.test(country);
  const isFromKosovo = c.includes('kosovo');
  if (isFromAlbania || isAlbanianDiaspora) flags.push('\u{1F1E6}\u{1F1F1}');
  if (isFromKosovo) flags.push('\u{1F1FD}\u{1F1F0}');
  if (c.includes('uk') || c.includes('united kingdom')) flags.push('\u{1F1EC}\u{1F1E7}');
  if (c.includes('usa') || c.includes('american')) flags.push('\u{1F1FA}\u{1F1F8}');
  if (c.includes('switzerland') || c.includes('swiss')) flags.push('\u{1F1E8}\u{1F1ED}');
  if (c.includes('france') || c.includes('french')) flags.push('\u{1F1EB}\u{1F1F7}');
  if (c.includes('germany') || c.includes('german')) flags.push('\u{1F1E9}\u{1F1EA}');
  if (c.includes('italy') || c.includes('italian')) flags.push('\u{1F1EE}\u{1F1F9}');
  if (c.includes('sweden') || c.includes('swedish')) flags.push('\u{1F1F8}\u{1F1EA}');
  if (c.includes('north macedonia') || c.includes('macedon')) flags.push('\u{1F1F2}\u{1F1F0}');
  if (c.includes('greece') || c.includes('greek')) flags.push('\u{1F1EC}\u{1F1F7}');
  if (c.includes('india')) flags.push('\u{1F1EE}\u{1F1F3}');
  if (c.includes('bosnia')) flags.push('\u{1F1E7}\u{1F1E6}');
  return [...new Set(flags)].join(' ');
}

function getMedal(rank) { return rank === 1 ? '\u{1F947}' : rank === 2 ? '\u{1F948}' : rank === 3 ? '\u{1F949}' : rank; }

// Table logic -- no pagination, show all 100
let filtered = [...TOP100];
let sortCol = 'rank';
let sortDir = 'asc';

function buildTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  filtered.forEach(p => {
    const col = getCatColor(p.category);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-rank"><span class="rank-medal">${getMedal(p.rank)}</span></td>
      <td class="td-name">${p.name}</td>
      <td><span class="cat-badge" style="background:${col.bg};color:${col.text}">${catLabel(p.category)}</span></td>
      <td class="td-flags">${getFlags(p.country)}</td>
      <td class="social-cell">${IG_ICON} ${fmtNum(p.instagram)}</td>
      <td class="social-cell">${TT_ICON} ${fmtNum(p.tiktok)}</td>
      <td class="social-cell">${G_ICON} ${fmtNum(p.google)}</td>
      <td class="td-achievement">${p.achievement}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('filter-count').textContent = filtered.length + ' rezultate';
}

function populateCatFilter() {
  const sel = document.getElementById('cat-filter');
  const cats = [...new Set(TOP100.map(p => p.category))].sort();
  cats.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = catLabel(c); sel.appendChild(opt); });
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  filtered = TOP100.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.profession.toLowerCase().includes(q) || p.country.toLowerCase().includes(q) || p.achievement.toLowerCase().includes(q);
    const matchCat = !cat || p.category === cat;
    return matchQ && matchCat;
  });
  buildTable();
}

// Sort click handlers
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (!col) return;
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = 'asc'; }
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    filtered.sort((a, b) => {
      let va = a[col], vb = b[col];
      if (col === 'rank' || col === 'score') { va = parseFloat(va)||0; vb = parseFloat(vb)||0; }
      else { va = String(va||'').toLowerCase(); vb = String(vb||'').toLowerCase(); }
      return va < vb ? (sortDir==='asc'?-1:1) : va > vb ? (sortDir==='asc'?1:-1) : 0;
    });
    buildTable();
  });
});

document.getElementById('search-input').addEventListener('input', applyFilters);
document.getElementById('cat-filter').addEventListener('change', applyFilters);

// Init
populateCatFilter();
buildTable();
</script>
